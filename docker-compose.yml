services:
  postgres:
    image: postgres:16
    container_name: mediatracker-db
    environment:
      POSTGRES_DB: mediatracker
      POSTGRES_USER: mediatracker_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: mediatracker-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mediatracker
      DB_USERNAME: mediatracker_user
      DB_PASSWORD: changeme
      JWT_SECRET: your-256-bit-secret-your-256-bit-secret
    depends_on:
      - postgres

volumes:
  postgres_data: